body:
  text: 太上浩元經老君曰浩元太眞君子之身上下三宮保營精神熈融視息吐吸新陳修實永固位爲仙人洞房玲瓏上下相通金鑪玉几鎮其中却入三寸哺玄穹還居中田移絳宮堅守靈闕泉淵融修此三者長雄雄朱衣靈賓熈且冲子能行之命無窮巾金素蓋成堅剛下益玄池漬魄房中起靈臺堅明堂調治神効修太倉精氣周遊五神强呼吸不輟昇蒼蒼上元童子神之精絳衣赤幘居黄庭南極老人爾修營存神安性得長生下元之神名谷玄北極眞人道之先守帝金神五藏王常持玉七坐金牀攪精哺一生金黄靈龜玉女居中央左録右命挾兩傍役使六丁驅百殃削去死藉命延長醴泉可飲盛玉漿恬惔無爲志不衰玉扇金籥靜多扉呼吸中和生細㣲還眞反朴㓜子機絶愛棄欲神自歸滑澤精液輝常輝易氣易髄上生肥道成形化身髙飛心靈倐忽過九圍安神定魄修此道鍊思冲神是吾寶太眞神丹成巳乆靈顔㓜色常鮮好三一習氣固靈根調五通七神之尊恢廓幽關道衆源雄雄氣崿修崐崘上宮朱裹宜以緼中宮赤幘儼而存下宮丹衣守精門審能行之齊乾坤太上浩元經
