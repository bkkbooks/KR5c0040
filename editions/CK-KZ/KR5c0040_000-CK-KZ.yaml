body:
  text: 太上浩源經老君曰浩源太眞君子之身上下三宮保營精神熙融視息吐吸新陳修實永固位爲仙人洞房玲瓏上下相通金鑪玉几鎭其中郤入三寸哺元穹還居中田移綘宮堅守靈關泉淵融修此三者長雄雄朱衣靈賓熙且冲子能修之命無窮巾金素蓋成堅剛下益元池漬魄房中起靈臺堅明堂調治神効修太倉精氣周遊五神强呼吸不輟昇蒼蒼上元童子神之精綘衣赤幘居黃庭南極老人爾修營存神安性得長生下元之神名谷元北極眞人道之先守帝金神五藏王常持玉匕坐金牀攪精哺一生金黃靈龜玉女居中央左錄右命挾兩傍役使六丁驅百殃削去死籍命延長醴泉可飲盛玉漿恬淡無爲志不衰玉扇金籥靜多扉呼吸中和生細微還眞反朴幼子機絶愛棄欲神自歸滑澤精液輝常輝易氣易髓上生肥道成形化身高飛心靈倐忽過九圍安神定魄修此道鍊思冲神是吾寶太眞神丹成已久靈顔幼色常鮮好三一習氣固靈根調通通七神之尊恢廓幽關道眾源雄雄氣崿修崑崙上宮朱裹宜以緼中宮赤幘儼而存下宮丹衣守精門審能行之齊乾坤太上浩元經
